<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, aesthetic dice roller widget">
    <title>Dice Roll</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='20' fill='%23cc0000'/><circle cx='30' cy='30' r='8' fill='white'/><circle cx='70' cy='70' r='8' fill='white'/><circle cx='30' cy='70' r='8' fill='white'/><circle cx='70' cy='30' r='8' fill='white'/><circle cx='50' cy='50' r='8' fill='white'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="effect-container" class="effect-overlay">
        <div id="effect-message" class="effect-text"></div>
    </div>
    <div class="app-layout">
        <div class="widget-container">
            
        <h1 class="widget-title">Roll A Die</h1>
        <div class="result-area">
            <div id="result-text">
                <svg viewBox="0 0 100 100" width="160" height="160" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="10" width="80" height="80" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="6,6"/>
                    <text x="50" y="50" dominant-baseline="middle" font-family="'Outfit', sans-serif" font-size="40" font-weight="800" text-anchor="middle" fill="#ffffff">?</text>
                </svg>
            </div>
            <span id="dice-type-label" class="label">주사위를 굴려 보자!</span>
        </div>
        <div class="buttons-grid">
            <button class="dice-btn" data-sides="4" title="Roll 1d4">1d4</button>
            <button class="dice-btn" data-sides="6" title="Roll 1d6">1d6</button>
            <button class="dice-btn" data-sides="10" title="Roll 1d10">1d10</button>
            <button class="dice-btn" data-sides="12" title="Roll 1d12">1d12</button>
            <button class="dice-btn" data-sides="20" title="Roll 1d20">1d20</button>
            <button class="dice-btn btn-primary" data-sides="100" title="Roll 1d100">1d100</button>
        </div>
        
        <div class="bottom-controls">
            <button id="logs-btn" class="icon-btn" title="기록 보기">기록</button>
            <button id="settings-btn" class="icon-btn" title="설정">설정</button>
        </div>
    </div> <!-- Close widget-container -->
        
    <div id="logs-panel" class="side-panel hidden">
        <button id="close-logs" class="icon-btn close-btn" title="닫기">✕</button>
        <h2>History</h2>
        <div id="logs-list" class="logs-container">
            <div class="log-item" style="justify-content: center; opacity: 0.5;">주사위를 굴리지 않았다.</div>
        </div>
        <button id="clear-logs-btn" class="dice-btn" style="padding: 0.6rem; font-size: 0.9rem; margin-top: auto; width: 100%;">Delete</button>
    </div>

    <div id="settings-panel" class="side-panel hidden">
        <button id="close-settings" class="icon-btn close-btn" title="닫기">✕</button>
        <h2>Settings</h2>
        <div style="display: flex; flex-direction: column; gap: 1.2rem; margin-top: 1.5rem;">
            <div class="setting-row">
                <label>주사위 면</label>
                <input type="color" id="color-dice" value="#cc0000">
            </div>
            <div class="setting-row">
                <label>결과 숫자</label>
                <input type="color" id="color-text" value="#ffffff">
            </div>
        </div>
    </div>
</div>
    
    <script src="js/main.js"></script>
</body>
</html>
